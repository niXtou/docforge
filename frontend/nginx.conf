server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the FastAPI backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE requires these headers — disables buffering so events flow immediately
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy Swagger UI docs to the backend
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_redirect off;
    }

    # SPA fallback: serve index.html for all non-asset routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite emits content-hashed bundles under /assets/ — safe to cache forever
    # because the URL changes whenever the file content changes.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static files (favicon, robots, etc.) sit at unhashed root URLs,
    # so content can change without a new URL — keep TTL short and require
    # revalidation. Without this, CDNs treat a one-line favicon change as
    # uncacheable-forever and ignore it for up to a year.
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 10m;
        add_header Cache-Control "public, max-age=600, must-revalidate";
        try_files $uri =404;
    }
}
