name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Enable auto-merge for everything except majors. fetch-metadata reports a
      # group's highest semver bump, so '!= major' covers grouped minor/patch PRs
      # while holding majors for review. No approval step: branch protection does
      # not require reviews, and GITHUB_TOKEN isn't permitted to approve PRs.
      - name: Enable auto-merge (non-major)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
