name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Collapse rapid pushes to the same ref into one run: a newer run cancels the
# in-progress one, so only the latest commit's build + deploy completes
# (avoids racing `docker compose up` on the VPS).
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Backend — lint, typecheck, tests
        working-directory: backend
        run: |
          uv sync --frozen --extra dev
          uv run ruff check .
          uv run ruff format --check .
          uv run pyright .
          uv run pytest -v

      - name: Frontend — lint, build, tests
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
          npm run test -- --run

  build-push:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend (ARM64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ./backend
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/docforge-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend (ARM64)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: ./frontend
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/docforge-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Lowercase repo owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345  # v1.0.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/docforge"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          REPO_OWNER: ${{ env.REPO_OWNER }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GITHUB_ACTOR,GHCR_PAT,REPO_OWNER
          script: |
            set -e
            cd ~/docforge
            echo "$GHCR_PAT" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin || echo "ghcr.io login failed — continuing (images are public)"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
